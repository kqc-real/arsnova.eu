<mat-card appearance="outlined" class="quiz-sync-card">
  <mat-card-content class="quiz-sync__content">
    <div class="dialog-title-header dialog-title-header--page quiz-sync__head">
      <span class="dialog-title-header__icon" aria-hidden="true">
        <mat-icon>sync_alt</mat-icon>
      </span>
      <span class="dialog-title-header__copy">
        <h2 class="dialog-title-header__heading" i18n="@@quizSync.title">Quiz-Sammlung teilen</h2>
      </span>
    </div>
    <p class="quiz-sync__lead" i18n="@@quizSync.intro">
      Verschick den Link – damit können andere dieselbe Sammlung auf ihrem Gerät öffnen.
    </p>
    <div class="quiz-sync__cta">
      <button
        matButton="filled"
        type="button"
        class="quiz-sync__link-copy"
        (click)="copySyncLink()"
      >
        <mat-icon>link</mat-icon>
        <span i18n="@@quizSync.copyLink">Sync-Link kopieren</span>
      </button>
    </div>
    <p class="quiz-sync__status">
      <span i18n="@@quizSync.statusPrefix">Status:</span>
      <strong class="quiz-sync__state" [class.quiz-sync__state--ok]="hasConnectedPeer()">
        {{ syncStatusLabel() }}
      </strong>
    </p>
    <div class="quiz-sync__footer">
      @if (copyStatus()) {
        <p class="quiz-sync__hint" role="status">{{ copyStatus() }}</p>
      }
      @if (syncError()) {
        <p class="quiz-sync__error" role="alert">{{ syncError() }}</p>
      }
      <a
        mat-button
        class="quiz-sync__back"
        [routerLink]="localizedPath('/quiz')"
        i18n-aria-label="@@quizSync.backAria"
        aria-label="Zurück zur Quiz-Sammlung"
      >
        <mat-icon>arrow_back</mat-icon>
        <span i18n="@@quizSync.back">Zurück zur Quiz-Sammlung</span>
      </a>
    </div>
  </mat-card-content>
</mat-card>
