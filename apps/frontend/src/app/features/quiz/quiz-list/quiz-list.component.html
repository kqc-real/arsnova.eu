<mat-card appearance="outlined" class="quiz-empty-state">
  <mat-card-content class="quiz-empty-state__content">
    <p class="quiz-empty-state__text">
      Noch keine Quizzes.
    </p>
    <a matButton="filled" routerLink="new" aria-label="Neues Quiz erstellen">
      <mat-icon>add_circle</mat-icon>
      Neues Quiz erstellen
    </a>
    <p class="quiz-empty-state__hint">
      Hier Quizzes anlegen und verwalten (Story 1.1, 1.8–1.10).
    </p>
  </mat-card-content>
</mat-card>
