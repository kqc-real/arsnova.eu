<div class="l-page" [class.l-section]="!isHostRoute()">
  @if (loading()) {
    <div class="session-page__state">
      <p class="session-page__muted-text" i18n>Wird geladen…</p>
    </div>
  } @else if (error()) {
    <mat-card class="session-page__error-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon class="session-page__error-icon">error</mat-icon>
          <span i18n>Fehler</span>
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="session-page__error-text" role="alert">{{ error() }}</p>
      </mat-card-content>
    </mat-card>
  } @else {
    <router-outlet />
  }
</div>
