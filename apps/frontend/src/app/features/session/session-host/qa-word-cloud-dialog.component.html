<section class="qa-word-cloud-dialog">
  <button
    mat-icon-button
    type="button"
    class="qa-word-cloud-dialog__close"
    matDialogClose
    i18n-aria-label="@@wordCloud.dialogCloseAria"
    aria-label="Wortwolke schließen"
  >
    <mat-icon aria-hidden="true">close</mat-icon>
  </button>

  <div class="qa-word-cloud-dialog__toolbar">
    <mat-button-toggle-group
      class="qa-word-cloud-dialog__sort-toggle"
      [value]="sortMode()"
      (valueChange)="setSortMode($any($event))"
      aria-label="Q&A-Sortierung"
      i18n-aria-label="@@sessionQa.sortAria"
    >
      <mat-button-toggle value="TOP" i18n="@@sessionQa.sortTop"
        >Meist unterstützt</mat-button-toggle
      >
      <mat-button-toggle value="BEST" i18n="@@sessionQa.sortBest">Beste Fragen</mat-button-toggle>
      <mat-button-toggle value="CONTROVERSIAL" i18n="@@sessionQa.sortControversial"
        >Umstritten</mat-button-toggle
      >
    </mat-button-toggle-group>
    <mat-button-toggle-group
      class="qa-word-cloud-dialog__analysis-toggle"
      [value]="analysisVariant()"
      (valueChange)="setAnalysisVariant($any($event))"
      i18n-aria-label="@@sessionQa.wordCloudAnalysisAria"
      aria-label="Wortwolken-Ansicht"
    >
      <mat-button-toggle value="LEXICAL" i18n="@@sessionQa.wordCloudAnalysisLexical"
        >Einzelwörter</mat-button-toggle
      >
      <mat-button-toggle
        value="THEME"
        [disabled]="!themeModeAvailable()"
        i18n="@@sessionQa.wordCloudAnalysisTheme"
        >Wörter &amp; Phrasen</mat-button-toggle
      >
    </mat-button-toggle-group>
    <button
      mat-button
      type="button"
      class="qa-word-cloud-dialog__freeze"
      [class.qa-word-cloud-dialog__freeze--active]="frozen()"
      [attr.aria-pressed]="frozen()"
      (click)="toggleFreeze()"
    >
      <mat-icon aria-hidden="true">{{ frozen() ? 'play_arrow' : 'pause' }}</mat-icon>
      <span>{{ freezeLabel() }}</span>
    </button>
  </div>

  @if (themeFallbackHint()) {
    <p class="qa-word-cloud-dialog__mode-note">{{ themeFallbackHint() }}</p>
  }

  <app-word-cloud
    class="qa-word-cloud-dialog__cloud"
    [responses]="responses()"
    [weightedResponses]="weightedResponses()"
    [terms]="terms()"
    [analysisEntries]="analysisEntries()"
    [analysisMode]="'qa'"
    [title]="title()"
    [eyebrow]="data.eyebrow"
    [description]="data.description"
    [itemLabelSingular]="data.itemLabelSingular"
    [itemLabelPlural]="data.itemLabelPlural"
    [showResponsesPanel]="false"
    [weightingHint]="weightingHint()"
    [tooltipMetricLabel]="tooltipMetricLabel()"
    [showReleaseNote]="false"
    [showMaximizeAction]="false"
    [presentationMode]="true"
  />
</section>
