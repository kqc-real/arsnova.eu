<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <title>arsnova.eu – Live-Quiz &amp; Abstimmung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Kostenlose, DSGVO-konforme Live-Quiz- und Abstimmungsplattform für Hochschulen." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1c1b1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png" />

  <body>
    <noscript>Bitte aktivieren Sie JavaScript, um arsnova.eu zu nutzen.</noscript>
    <app-root>
      <!-- LCP-Shell: sofort sichtbar, reduziert Render-Delay bis Angular bootstrapped (Trace: LCP breakdown). -->
      <div class="app-shell" aria-hidden="true" style="position:sticky;top:0;z-index:10;margin-bottom:1.25rem;border-radius:28px;background:var(--mat-sys-surface-container,#efedf0);padding:1rem;box-shadow:0 2px 1px -1px rgba(0,0,0,.2), 0 1px 1px 0 rgba(0,0,0,.14);">
        <h1 style="margin:0;font:400 1.75rem/2.25rem system-ui;color:var(--mat-sys-on-surface,#1a1b1f);">arsnova.eu</h1>
      </div>
    </app-root>
  </body>
</html>
