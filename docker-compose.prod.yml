# =============================================================================
# arsnova.eu – Produktion (Debian Root-Server)
# Voraussetzung: `.env.production` liegt im selben Verzeichnis wie diese Datei (nicht im Git).
# Start: docker compose -f docker-compose.prod.yml up -d
# (Optional weiterhin: --env-file .env.production, falls die Datei woanders liegt.)
#
# Hinweis: Früher wurden Secrets per `environment: ADMIN_SECRET: ${ADMIN_SECRET}` eingespeist.
# Ohne `docker compose --env-file …` war `${ADMIN_SECRET}` leer und hat den Admin-Login gebrochen.
# `env_file` lädt die Werte zuverlässig direkt aus `.env.production` in den Container.
# Ports nur auf 127.0.0.1 gebunden → Nginx als einziger Einstieg (TLS, Reverse Proxy)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: arsnova-v3-postgres
    restart: always
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arsnova_user -d arsnova_v3"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arsnova-v3-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arsnova-v3-app
    restart: always
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:3002:3002"
    environment:
      # Fixe Laufzeitwerte; DATABASE_URL, REDIS_URL, JWT_SECRET, ADMIN_* kommen aus `.env.production`
      PORT: "3000"
      HOST: "0.0.0.0"
      WS_PORT: "3001"
      YJS_WS_PORT: "3002"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/trpc/health.check"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
