version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    ignore:
      # Angular 22 erfordert koordinierte Migration aller @angular/*-Pakete (Runtime + Tooling).
      - dependency-name: '@angular/*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@angular-devkit/*'
        update-types: ['version-update:semver-major']
      # @y/websocket-server 0.1.5 kollidiert mit @y/y (yjs 14) und Root-Override (yjs 13.6.31).
      # exclude-patterns in groups reicht nicht — Dependabot öffnet sonst weiterhin Einzel-PRs.
      - dependency-name: '@y/websocket-server'
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
        update-types:
          - minor
          - patch
      testing:
        dependency-type: development
        patterns:
          - vitest
          - '@vitest/*'
          - playwright
      production-patches:
        dependency-type: production
        update-types:
          - patch
          - minor
        exclude-patterns:
          # @y/websocket-server 0.1.5 kollidiert mit @y/y (yjs 14) und Root-Override (yjs 13.6.31).
          - '@y/websocket-server'
