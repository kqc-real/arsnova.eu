version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
      testing:
        dependency-type: development
        patterns:
          - vitest
          - '@vitest/*'
          - playwright
      production-patches:
        dependency-type: production
        update-types:
          - patch
          - minor
