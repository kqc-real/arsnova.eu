  # ─── Security Scan (Filesystem) ────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping Trivy FS."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run Trivy FS scan
        if: needs.changes.outputs.docs_only != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate Trivy FS SARIF report
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'

      - name: Upload Trivy FS report
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-fs-report
          path: trivy-fs.sarif
          if-no-files-found: error
          retention-days: 7

  # ─── Security Scan (Docker Image) ──────────────────────────────────────────
  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: [changes, docker]
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping Trivy image."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Docker Buildx
        if: needs.changes.outputs.docs_only != 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Docker image for scanning
        if: needs.changes.outputs.docs_only != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          tags: arsnova-eu:scan-${{ github.sha }}
          cache-from: type=gha

      - name: Run Trivy image scan
        if: needs.changes.outputs.docs_only != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: arsnova-eu:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate Trivy image SARIF report
