# =============================================================================
# arsnova.eu – CI & Deploy (GitHub Actions)
# Story 0.6: Build, Lint, Validate, Audit, Docker
# Deploy: Nur bei Push auf main, nach allen Tests; optional eigener Branch (s. unten).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Deploy-Branch: Standard ist main. Optional Repository-Variable DEPLOY_BRANCH setzen (z. B. deploy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ─── Dependency Review (PR) ────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Dependency review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48

      - name: Dependency review result
        if: always()
        run: echo "Dependency review completed (informational, non-blocking in CI workflow)."

  # ─── Workflow Lint (GitHub Actions) ───────────────────────────────────────
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7

  # ─── Build & Validate ────────────────────────────────────────────────────────
  build:
    name: Build & Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate --schema prisma/schema.prisma

      - name: Prisma generate
        run: npx prisma generate --schema prisma/schema.prisma

      - name: TypeScript build – shared-types + backend
        run: npx tsc -b apps/backend/tsconfig.json

      - name: TypeScript compile – frontend
        run: npx tsc --project apps/frontend/tsconfig.app.json --noEmit

      - name: Frontend localized production build (alle Locales)
        run: npm run build:localize -w @arsnova/frontend

      - name: Upload frontend production build
        if: matrix.node-version == 22
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-dist-browser
          path: apps/frontend/dist/browser
          if-no-files-found: error
          retention-days: 1

  # Explizites `npm run typecheck` (Backend + Frontend, --noEmit) — ergänzt die
  # tsc-Schritte im build-Job; eigener Check in der PR-Übersicht, parallel zu build.
  typecheck:
    name: Typecheck (workspaces)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate --schema prisma/schema.prisma

      - name: Prisma generate
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Typecheck (npm run typecheck)
        run: npm run typecheck

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─── Security Audit ──────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical severity gate)
        run: npm audit --audit-level=critical --omit=dev

  # ─── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Run tests with coverage gate
        run: npm run test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-reports
          path: |
            apps/backend/coverage
            apps/frontend/coverage
          if-no-files-found: error
          retention-days: 7

  # ─── Lighthouse Performance Audit ───────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Download frontend production build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: frontend-dist-browser
          path: apps/frontend/dist/browser

      - name: Run Lighthouse CI
        run: |
          set -euo pipefail
          cd apps/frontend/dist/browser
          python3 -m http.server 4173 > "$RUNNER_TEMP/frontend-static.log" 2>&1 &
          server_pid="$!"
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          lighthouse_ready=0
          for _ in {1..30}; do
            if curl -fsS http://localhost:4173/de/ >/dev/null; then
              lighthouse_ready=1
              break
            fi
            sleep 1
          done

          if [ "$lighthouse_ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/frontend-static.log"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"
          npx -y @lhci/cli@0.15.1 autorun --config=.lighthouserc.cjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
          retention-days: 7

  # ─── End-to-End Tests (Playwright Smoke) ────────────────────────────────────
  e2e:
    name: Playwright Smoke E2E
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arsnova_user
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: arsnova_v3_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arsnova_user -d arsnova_v3_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_USER: arsnova_user
      DB_PASSWORD: secretpassword
      DB_NAME: arsnova_v3_dev
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret
      ADMIN_SECRET: ci-admin-secret
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      WS_PORT: 3001
      YJS_WS_PORT: 3002

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Push Prisma schema
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}?schema=public"
          npx prisma db push --schema prisma/schema.prisma

      - name: Build shared types
        run: npm run build -w @arsnova/shared-types

      - name: Download frontend production build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: frontend-dist-browser
          path: apps/frontend/dist/browser

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke flow
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}?schema=public"
          cleanup() {
            if [ -f "$RUNNER_TEMP/frontend.pid" ]; then
              kill "$(cat "$RUNNER_TEMP/frontend.pid")" 2>/dev/null || true
            fi
            if [ -f "$RUNNER_TEMP/backend.pid" ]; then
              kill "$(cat "$RUNNER_TEMP/backend.pid")" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          npm run dev -w @arsnova/backend > "$RUNNER_TEMP/backend.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/backend.pid"
          for attempt in {1..60}; do
            if curl -fsS http://localhost:3000/trpc/health.check >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              cat "$RUNNER_TEMP/backend.log"
              exit 1
            fi
            sleep 1
          done

          PORT=4200 BACKEND_URL=http://localhost:3000 npm run serve:localize:api -w @arsnova/frontend > "$RUNNER_TEMP/frontend.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/frontend.pid"
          frontend_ready=0
          for _ in {1..60}; do
            if curl -fsS http://localhost:4200/de/ >/dev/null; then
              frontend_ready=1
              break
            fi
            sleep 1
          done

          if [ "$frontend_ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/frontend.log"
            exit 1
          fi

          BASE_URL=http://localhost:4200/de TRPC_URL=http://localhost:3000/trpc npm run smoke:unified-session -w @arsnova/frontend

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-service-logs
          path: |
            ${{ runner.temp }}/backend.log
            ${{ runner.temp }}/frontend.log
          if-no-files-found: ignore
          retention-days: 7

  # ─── Load Test (k6, scheduled/manual against production) ───────────────────
  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run k6 health load test against production
        uses: grafana/k6-action@e4714b734f2b0afaabeb7b4a69142745548ab9ec
        with:
          filename: scripts/load/k6-trpc-health-50vu.js
        env:
          BASE_URL: https://arsnova.eu

  # ─── Security Scan (Filesystem) ────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate Trivy FS SARIF report
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'

      - name: Upload Trivy FS report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-fs-report
          path: trivy-fs.sarif
          if-no-files-found: error
          retention-days: 7

  # ─── Security Scan (Docker Image) ──────────────────────────────────────────
  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Docker image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          tags: arsnova-eu:scan-${{ github.sha }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: arsnova-eu:scan-${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate Trivy image SARIF report
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: arsnova-eu:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-image-report
          path: trivy-image.sarif
          if-no-files-found: error
          retention-days: 7

  # ─── Docker Build (inkl. lokalisiertem Frontend-Build) ──────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          tags: arsnova-eu:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy (nur Push auf main, nach allen Qualitäts-Gates) ───────────────────
  # Läuft nur, wenn Repository-Variable DEPLOY_ENABLED = 'true' gesetzt ist.
  # Ohne Server: Variable weglassen → Deploy wird übersprungen, CI bleibt grün.
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [lint, test, docker, typecheck, lighthouse, e2e, audit, trivy-fs, trivy-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    timeout-minutes: 30
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    environment:
      name: production

    env:
      DEPLOY_DIR: /home/deploy/arsnova.eu
      DEPLOY_BRANCH: main

    steps:
      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          echo "Deploy configuration looks complete."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_DIR,DEPLOY_BRANCH
          script: |
            set -e
            export DEPLOY_DIR="${DEPLOY_DIR:-/home/deploy/arsnova.eu}"
            export DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

  # ─── Post-Deploy Smoke Check ───────────────────────────────────────────────
  post-deploy-smoke:
    name: Post-Deploy Smoke Check
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Verify production serving
        run: node scripts/verify-production-serving.mjs "https://${{ secrets.DEPLOY_HOST }}"

  # ─── Rollback (wenn Post-Deploy-Smoke fehlschlägt) ───────────────────────
  rollback-on-smoke-failure:
    name: Rollback on Smoke Failure
    runs-on: ubuntu-latest
    needs: [deploy, post-deploy-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success' && needs.post-deploy-smoke.result == 'failure' && github.event.before != '0000000000000000000000000000000000000000'
    timeout-minutes: 30
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    environment:
      name: production

    env:
      DEPLOY_DIR: /home/deploy/arsnova.eu
      DEPLOY_BRANCH: main
      ROLLBACK_SHA: ${{ github.event.before }}

    steps:
      - name: Validate rollback configuration
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          test -n "${ROLLBACK_SHA}" || (echo "Missing rollback SHA" && exit 1)
          echo "Rollback configuration looks complete."

      - name: Roll back via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_DIR,DEPLOY_BRANCH,ROLLBACK_SHA
          script: |
            set -e
            export DEPLOY_DIR="${DEPLOY_DIR:-/home/deploy/arsnova.eu}"
            export DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "$ROLLBACK_SHA"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
