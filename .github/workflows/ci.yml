# =============================================================================
# arsnova.eu – CI & Deploy (GitHub Actions)
# Story 0.6: Build, Lint, Validate, Audit, Docker
# Deploy: Nur bei Push auf main, nach allen Tests; optional eigener Branch (s. unten).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      artillery_participants:
        description: 'Teilnehmende für Artillery (500 Kapazitätsstandard)'
        required: false
        default: '500'
        type: string
      artillery_ramp_seconds:
        description: 'Ramp-up-Dauer für Artillery'
        required: false
        default: '60'
        type: string
      run_production_load:
        description: 'Explizit den k6-Health-Lasttest gegen Produktion ausführen'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Deploy-Branch: Standard ist main. Optional Repository-Variable DEPLOY_BRANCH setzen (z. B. deploy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Docs-only PRs: Jobs laufen weiter (Ruleset-Pflichtchecks behalten Matrix-Namen),
  # schwere Steps werden per Step-if übersprungen (Fast Pass statt job-level skip).

  # ─── Change Filter ────────────────────────────────────────────────────────
  changes:
    name: Change Filter
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: filter
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          docs_only=false
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$PR_HEAD_SHA"
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            if [[ "$PUSH_BEFORE" =~ ^0{40}$ ]]; then
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            base_sha="$PUSH_BEFORE"
            head_sha="$HEAD_SHA"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")
          if (( ${#changed_files[@]} > 0 )); then
            docs_only=true
            for file in "${changed_files[@]}"; do
              if [[ "$file" == docs/* || "$file" == *.md ]]; then
                continue
              fi
              docs_only=false
              break
            done
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          printf 'Changed files (%s):\n' "${#changed_files[@]}"
          if (( ${#changed_files[@]} > 0 )); then
            printf ' - %s\n' "${changed_files[@]}"
          fi

  # ─── Dependency Review (PR) ────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high

  # ─── Workflow Lint (GitHub Actions) ───────────────────────────────────────
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7

  format:
    name: Changed Files Format
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check changed files with Prettier
        env:
          FORMAT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          FORMAT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npm run format:check:changed

  migration:
    name: Migration Drift
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'
    env:
      DATABASE_URL: postgresql://arsnova_user:secretpassword@localhost:5432/arsnova_v3_migration?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arsnova_user
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: arsnova_v3_migration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arsnova_user -d arsnova_v3_migration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping migration drift check."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Apply versioned migrations
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma migrate deploy --schema prisma/schema.prisma

      - name: Reject migration/schema drift
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code

  # ─── Build & Validate ────────────────────────────────────────────────────────
  build:
    name: Build & Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping build."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js ${{ matrix.node-version }}
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Prisma validate
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma validate --schema prisma/schema.prisma

      - name: Prisma generate
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma generate --schema prisma/schema.prisma

      - name: TypeScript build – shared-types + backend
        if: needs.changes.outputs.docs_only != 'true'
        run: npx tsc -b apps/backend/tsconfig.json

      - name: TypeScript compile – frontend
        if: needs.changes.outputs.docs_only != 'true'
        run: npx tsc --project apps/frontend/tsconfig.app.json --noEmit

      - name: Frontend localized production build (alle Locales)
        if: needs.changes.outputs.docs_only != 'true' && matrix.node-version == 22
        run: npm run build:localize -w @arsnova/frontend

      - name: Upload frontend production build
        if: needs.changes.outputs.docs_only != 'true' && matrix.node-version == 22
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-dist-browser
          path: apps/frontend/dist/browser
          if-no-files-found: error
          retention-days: 1

  landing-build:
    name: Build Landing
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping landing build."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Build landing
        if: needs.changes.outputs.docs_only != 'true'
        env:
          PUBLIC_GITHUB_REPO: ${{ github.repository }}
          PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:landing

  # Explizites `npm run typecheck` (Backend + Frontend, --noEmit) — ergänzt die
  # tsc-Schritte im build-Job; eigener Check in der PR-Übersicht, parallel zu build.
  typecheck:
    name: Typecheck (workspaces) (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping typecheck."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js ${{ matrix.node-version }}
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Prisma validate
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma validate --schema prisma/schema.prisma

      - name: Prisma generate
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Typecheck (npm run typecheck)
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run typecheck

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping lint."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Run ESLint
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run lint

      - name: Check i18n locale consistency
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run check:i18n -w @arsnova/frontend

  # ─── Security Audit ──────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping audit."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: npm audit (high severity gate)
        if: needs.changes.outputs.docs_only != 'true'
        run: npm audit --audit-level=high --omit=dev

      - name: Generate CycloneDX production SBOM
        if: needs.changes.outputs.docs_only != 'true'
        run: npm sbom --omit=dev --sbom-format=cyclonedx > sbom.cdx.json

      - name: Upload production SBOM
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: production-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

  # ─── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping tests."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Prisma generate
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Run tests with coverage gate
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run test:coverage

      - name: Upload coverage reports
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-reports
          path: |
            libs/shared-types/coverage
            apps/backend/coverage
            apps/frontend/coverage
          if-no-files-found: error
          retention-days: 7

  # ─── Lighthouse Performance Audit ───────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name != 'schedule'
    timeout-minutes: 15

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping Lighthouse."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Download frontend production build
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: frontend-dist-browser
          path: apps/frontend/dist/browser

      - name: Run Lighthouse CI
        if: needs.changes.outputs.docs_only != 'true'
        run: |
          set -euo pipefail
          node scripts/serve-static-compressed.mjs apps/frontend/dist/browser 4173 > "$RUNNER_TEMP/frontend-static.log" 2>&1 &
          server_pid="$!"
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          lighthouse_ready=0
          for _ in {1..30}; do
            if curl -fsS http://localhost:4173/de/ >/dev/null; then
              lighthouse_ready=1
              break
            fi
            sleep 1
          done

          if [ "$lighthouse_ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/frontend-static.log"
            exit 1
          fi

          npx -y @lhci/cli@0.15.1 autorun --config=.lighthouserc.cjs

      - name: Upload Lighthouse reports
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
          retention-days: 7

  # ─── End-to-End Tests (Playwright Smoke) ────────────────────────────────────
  e2e:
    name: Playwright Smoke E2E
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name != 'schedule'
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arsnova_user
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: arsnova_v3_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arsnova_user -d arsnova_v3_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_USER: arsnova_user
      DB_PASSWORD: secretpassword
      DB_NAME: arsnova_v3_dev
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret
      ADMIN_SECRET: ci-admin-secret
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      WS_PORT: 3001
      YJS_WS_PORT: 3002

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping E2E."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js 22
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Prisma generate
        if: needs.changes.outputs.docs_only != 'true'
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Apply production migrations
        if: needs.changes.outputs.docs_only != 'true'
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}?schema=public"
          npx prisma migrate deploy --schema prisma/schema.prisma

      - name: Build shared types
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run build -w @arsnova/shared-types

      - name: Download frontend production build
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: frontend-dist-browser
          path: apps/frontend/dist/browser

      - name: Install Playwright Chromium
        if: needs.changes.outputs.docs_only != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke flow
        if: needs.changes.outputs.docs_only != 'true'
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}?schema=public"
          cleanup() {
            if [ -f "$RUNNER_TEMP/frontend.pid" ]; then
              kill "$(cat "$RUNNER_TEMP/frontend.pid")" 2>/dev/null || true
            fi
            if [ -f "$RUNNER_TEMP/backend.pid" ]; then
              kill "$(cat "$RUNNER_TEMP/backend.pid")" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          npm run dev -w @arsnova/backend > "$RUNNER_TEMP/backend.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/backend.pid"
          for attempt in {1..60}; do
            if curl -fsS http://localhost:3000/trpc/health.check >/dev/null; then
              if kill -0 "$(cat "$RUNNER_TEMP/backend.pid")" 2>/dev/null; then
                break
              fi
              echo "Backend-Prozess ist beendet."
              cat "$RUNNER_TEMP/backend.log"
              exit 1
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Backend-Server konnte nicht gestartet werden."
              cat "$RUNNER_TEMP/backend.log"
              exit 1
            fi
            sleep 1
          done

          PORT=4200 BACKEND_URL=http://localhost:3000 npm run serve:localize:api -w @arsnova/frontend > "$RUNNER_TEMP/frontend.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/frontend.pid"
          frontend_ready=0
          for _ in {1..60}; do
            if curl -fsS http://localhost:4200/de/ >/dev/null; then
              frontend_ready=1
              break
            fi
            sleep 1
          done

          if [ "$frontend_ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/frontend.log"
            exit 1
          fi

          export BASE_URL=http://localhost:4200/de
          export TRPC_URL=http://localhost:3000/trpc
          export SMOKE_ARTIFACT_DIR="$RUNNER_TEMP/browser-smokes"
          npm run smoke:host-present-auth -w @arsnova/frontend
          npm run smoke:host-music -w @arsnova/frontend
          npm run smoke:short-text -w @arsnova/frontend
          npm run smoke:numeric-estimate -w @arsnova/frontend
          npm run smoke:quiz-sync -w @arsnova/frontend
          npm run smoke:unified-session -w @arsnova/frontend

      - name: Upload E2E logs
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-service-logs
          path: |
            ${{ runner.temp }}/backend.log
            ${{ runner.temp }}/frontend.log
            ${{ runner.temp }}/browser-smokes
          if-no-files-found: ignore
          retention-days: 7

  # ─── Classroom Scenario Smokes (tRPC, Postgres + Redis, Backend only) ───────
  classroom-smokes:
    name: Classroom Scenario Smokes
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name != 'schedule'
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arsnova_user
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: arsnova_v3_dev
        ports:
          - 5432:5432
        options: >-
