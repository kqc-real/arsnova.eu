  # ─── Docker Build (inkl. lokalisiertem Frontend-Build) ──────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name != 'schedule'

    steps:
      - name: Docs-only fast pass
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change — skipping Docker build."

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Docker Buildx
        if: needs.changes.outputs.docs_only != 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Docker image
        if: needs.changes.outputs.docs_only != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          tags: arsnova-eu:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy Freshness Check (nur aktueller main-HEAD darf deployen) ──────────
  deploy-freshness:
    name: Deploy Freshness Check
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        actionlint,
        format,
        migration,
        landing-build,
        lint,
        test,
        docker,
        typecheck,
        lighthouse,
        e2e,
        classroom-smokes,
        audit,
        trivy-fs,
        trivy-image,
      ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' && needs.changes.outputs.docs_only != 'true'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}

    steps:
      - name: Check current main head
        id: check
        env:
          DEPLOY_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"

          if [[ "$current_main_sha" != "$DEPLOY_SHA" ]]; then
            echo "Deploy SHA $DEPLOY_SHA ist nicht mehr aktueller main-HEAD ($current_main_sha); Deploy wird übersprungen."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Deploy SHA ist aktueller main-HEAD: $DEPLOY_SHA"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  # ─── Deploy (nur Push auf main, nach allen Qualitäts-Gates) ───────────────────
  # Läuft nur, wenn Repository-Variable DEPLOY_ENABLED = 'true' gesetzt ist.
  # Ohne Server: Variable weglassen → Deploy wird übersprungen, CI bleibt grün.
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: deploy-freshness
    if: needs.deploy-freshness.outputs.should_deploy == 'true'
    timeout-minutes: 30
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    environment:
      name: production

    env:
      DEPLOY_DIR: /home/deploy/arsnova.eu
      DEPLOY_BRANCH: main
      DEPLOY_SHA: ${{ github.sha }}

    steps:
      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          echo "Deploy configuration looks complete."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_DIR,DEPLOY_BRANCH,DEPLOY_SHA
          script: |
            set -e
            export DEPLOY_DIR="${DEPLOY_DIR:-/home/deploy/arsnova.eu}"
            export DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            cd "$DEPLOY_DIR"
            chmod +x scripts/deploy.sh
            DEPLOY_SHA="$DEPLOY_SHA" ./scripts/deploy.sh

  # ─── Post-Deploy Smoke Check ───────────────────────────────────────────────
  post-deploy-smoke:
    name: Post-Deploy Smoke Check
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Verify production serving
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail

          if printf '%s' "$DEPLOY_HOST" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "DEPLOY_HOST ist eine IP-Adresse ($DEPLOY_HOST). TLS-Zertifikate enthalten i. d. R. DNS-Namen, nicht IP-SANs."
            echo "Setze DEPLOY_HOST auf den öffentlichen DNS-Namen mit gültigem Zertifikat (z. B. arsnova.eu)."
            exit 1
          fi

          SMOKE_URL="https://$DEPLOY_HOST"
          node scripts/verify-production-serving.mjs "$SMOKE_URL"

  # ─── Rollback (wenn Post-Deploy-Smoke fehlschlägt) ───────────────────────
  rollback-on-smoke-failure:
    name: Rollback on Smoke Failure
    runs-on: ubuntu-latest
    needs: [deploy, post-deploy-smoke]
    # Run only for real push deployments on main when the smoke test failed.
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success' && needs.post-deploy-smoke.result == 'failure' && github.event.before != '0000000000000000000000000000000000000000' }}
    timeout-minutes: 30
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    environment:
      name: production

    env:
      DEPLOY_DIR: /home/deploy/arsnova.eu
      DEPLOY_BRANCH: main
      DEPLOY_SHA: ${{ github.event.before }}

    steps:
      - name: Validate rollback configuration
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          test -n "${DEPLOY_SHA}" || (echo "Missing rollback SHA" && exit 1)
          echo "Rollback configuration looks complete."

      - name: Roll back via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_DIR,DEPLOY_BRANCH,DEPLOY_SHA
          script: |
            set -e
            export DEPLOY_DIR="${DEPLOY_DIR:-/home/deploy/arsnova.eu}"
            export DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            chmod +x scripts/deploy.sh
            DEPLOY_SHA="$DEPLOY_SHA" ./scripts/deploy.sh
