# =============================================================================
# arsnova.eu – Landing (GitHub Pages)
# Baut apps/landing und veröffentlicht auf GitHub Pages.
# Voraussetzung: Repo → Settings → Pages → Source: "GitHub Actions"
# =============================================================================

name: Deploy Landing (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Landing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expected Pages URL
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Nach Deploy erreichbar unter: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Build landing
        env:
          PUBLIC_GITHUB_REPO: ${{ github.repository }}
          PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:landing

      - name: List artifact root (Debug)
        run: ls -la apps/landing/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: apps/landing/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
