name: Security · CodeQL (SAST)

run-name: >-
  SAST · ${{
    github.event_name == 'schedule' && 'Weekly' ||
    github.event_name == 'workflow_dispatch' && 'Manual' ||
    github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) ||
    github.ref_name
  }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8096e4f9571939c23cbd19018c44c665f90096af
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@8096e4f9571939c23cbd19018c44c665f90096af
        with:
          category: /language:javascript-typescript
